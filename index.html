<style>

.num{text-align:right;font-variant-numeric:tabular-nums}.ctr{text-align:center}.lbl{font-weight:600}
.note{color:#6b6451;font-size:12px}
.grp{color:#9a9277;font-size:11px;font-weight:400}
.pos{color:var(--green);font-weight:700}.neg{color:var(--orange);font-weight:700}.neu{color:var(--gold);font-weight:700}

.bul{margin:6px 0 6px 4px;list-style:none}
.bul li{position:relative;padding:3px 0 3px 18px}

.feed{display:grid;grid-template-columns:84px 1fr 110px;gap:12px;align-items:center;background:var(--card);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:5px;padding:10px 12px;margin-bottom:8px}

 const f=b.int?0:1;const ar=b.cur>b.prev?"▲":(b.cur<b.prev?"▼":"▬");const t=b.cur>b.prev?"pos":(b.cur<b.prev?"neg":"neu");
 return `<tr><td class="lbl">${e(b.name)}</td><td class="num">${nf(b.cur,f)}</td><td class="num">${nf(b.prev,f)}</td>

function kpis(D){return D.kpi_cards.map(c=>`<div class="kpi"><div class="kpi-l">${e(c.label)}</div>
 <div class="kpi-v">${e(c.value)}</div><div class="kpi-d ${c.pos?"pos":"neg"}">${e(c.delta)}</div></div>`).join("");}

 return `<tr><td class="lbl">${e(p.name)}</td><td class="num">${nf(cur,1)}</td><td class="num">${nf(prev,1)}</td><td class="num ${t}">${(d*100>=0?"+":"")+(d*100).toFixed(1)}%</td><td class="ctr ${t}">${ar}</td><td class="num">${p.avg!=null?nf(p.avg,1):"—"}</td><td class="note">${e(p.src)}</td></tr>`;}).join("");}

 return `<tr><td class="lbl">${e(m.name)}</td><td class="num">${e(m.value)}</td>
 <td class="num ${t}">${(m.day>=0?"+":"")+m.day.toFixed(2)}%</td><td class="ctr ${t}">${ar}</td><td class="note">${e(m.note)}</td></tr>`;}).join("");}
function lmeRows(D){const s=D.lme_series;return s.map((r,i)=>{const pc=i<s.length-1?s[i+1][1]:r[1];const dd=r[1]-pc;const dc=dd>0?"pos":(dd<0?"neg":"neu");const ar=dd>0?"▲":(dd<0?"▼":"▬");return `<tr><td class="ctr">${e(r[0])}</td><td class="num">${nf(r[1],1)}</td><td class="num">${nf(r[2],1)}</td><td class="num">${nf(r[3],0)}</td><td class="num">${nf(r[1]-r[2],1)}</td><td class="num ${dc}">${ar} ${dd>=0?"+":"−"}${nf(Math.abs(dd),1)}</td></tr>`;}).join("");}

function lmeHero(D){
 const s=D.lme_series; if(!s||s.length<2)return"";

 const spr=cash[0]-m3[0],back=spr>0;
 const badge=`<span style="font-size:10.5px;font-weight:700;border-radius:5px;padding:1px 6px;${back?"color:#185FA5;background:#E6F1FB":"color:var(--gold);background:var(--cream)"}">${back?"BACKWARDATION":"CONTANGO"}</span>`;
 const sprCard=`<div style="background:var(--card);border:1px solid var(--line);border-radius:9px;padding:10px 12px"><div style="font-size:10.5px;letter-spacing:.5px;color:#6B6353;text-transform:uppercase">Cash–3M</div><div style="font-size:23px;font-weight:700;line-height:1.1">${spr>=0?"+":"−"}${Math.abs(spr).toFixed(1)}</div>${badge}${spark(o2n(cash.map((c,i)=>c-m3[i])),"#185FA5")}</div>`;

 const read=D.lme_commentary?`<div style="background:var(--card);border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:8px;padding:10px 13px;margin-bottom:14px"><div style="font-size:10.5px;letter-spacing:1px;color:var(--gold);font-weight:700;text-transform:uppercase">Trader's read · auto-updated</div><div style="font-size:13px;line-height:1.55;margin-top:3px">${e(D.lme_commentary.replace(/^Commentary:\s*/,""))} <span data-go="outlook" style="color:var(--gold);font-weight:600;cursor:pointer">See EW Outlook →</span></div></div>`:"";
 return `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px">${card("Cash $/t",nf(cash[0],1),dp(cash),cash)}${card("3-Month $/t",nf(m3[0],1),dp(m3),m3)}${sprCard}${card("Inventory t",nf(stk[0],0),dp(stk),stk)}</div><div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">${pills}</div>${read}`;
}
function lmeContext(D){
 const CARD='background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 13px';
 const SUB='font-size:10px;color:#6B6353', BIG='font-size:18px;font-weight:700', NOTE='font-size:11px;color:#6B6353;margin-top:6px', HDR='font-weight:700;font-size:12.5px;margin-bottom:6px';
 const bm=D.benchmark||[],fb=n=>(bm.find(b=>b.name.indexOf(n)>=0)||{});
 const pr=D.premiums||[],fp=n=>(pr.find(p=>p.name.indexOf(n)>=0)||{});
 const board=D.metals_board||[],hist=D.metals_history;
 const maxY=Math.max(1,...board.map(m=>Math.abs(m.ytd||0)));
 const rows=board.map((m,i)=>{const d=m.day||0,fl=d===0,up=d>0,ar=fl?"▬":(up?"▲":"▼"),dc=fl?"neu":(up?"pos":"neg");const w=Math.round(Math.abs(m.ytd||0)/maxY*120),yc=(m.ytd||0)>=0?"var(--gold)":"var(--orange)";return `<tr style="${i===0?'background:var(--cream)':''}"><td style="font-weight:${i===0?700:400}">${e(m.name)}</td><td class="num">${nf(m.price,0)}</td><td class="num ${dc}">${ar} ${Math.abs(d).toFixed(1)}%</td><td><span style="display:inline-block;width:${w}px;height:9px;background:${yc};border-radius:3px;vertical-align:middle"></span> <b>${(m.ytd||0)>=0?"+":""}${m.ytd}%</b></td></tr>`;}).join("");
 const boardHTML=`<h3>Base-metals board <span class="row-links">3-month, $/t</span></h3><table><thead><tr><th>Metal</th><th class="num">Price</th><th class="num">Day</th><th>YTD 2026</th></tr></thead><tbody>${rows}</tbody></table>`;
 let relHTML="";
 if(hist&&hist.al){const ser=[[hist.al,"#8E7C42","Al"],[hist.cu,"#B8A567","Cu"],[hist.ni,"#185FA5","Ni"]];const all=[].concat(...ser.map(s=>s[0])),mn=Math.min(...all),mx=Math.max(...all),rg=(mx-mn)||1,W=320,H=120,n=hist.al.length;const px=i=>(6+(W-12)*i/(n-1)),py=v=>(H-14-(v-mn)/rg*(H-30));const ln=ser.map(s=>`<polyline points="${s[0].map((v,i)=>px(i).toFixed(1)+","+py(v).toFixed(1)).join(" ")}" fill="none" stroke="${s[1]}" stroke-width="2.2"/>`).join("");const lb=ser.map(s=>`<text x="${W-2}" y="${py(s[0][n-1]).toFixed(1)}" font-size="10" fill="${s[1]}" text-anchor="end">${s[2]} +${s[0][n-1]-100}</text>`).join("");relHTML=`<div style="${CARD}"><div style="${HDR}">Relative performance (1Y, rebased 100)</div><svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><line x1="6" y1="${py(100).toFixed(1)}" x2="${W-6}" y2="${py(100).toFixed(1)}" stroke="var(--line)" stroke-dasharray="3 3"/>${ln}${lb}</svg><div style="${NOTE}">Copper has led; aluminium close behind — both far ahead of nickel.</div></div>`;}
 const lme=fb("3-Month").cur,shfe=fb("SHFE").cur;let arbHTML="";

 const mjp=fp("MJP").cur,edu=fp("European Duty").cur,us=fp("US Midwest Duty-Paid").cur;let landHTML="";
 if(lme!=null){const reg=[["Japan","MJP",mjp],["Europe","EDU",edu],["US Midwest","duty-paid",us]].filter(r=>r[2]!=null);const maxL=Math.max(...reg.map(r=>lme+r[2]));const bars=reg.map(r=>{const tot=lme+r[2],bp=Math.round(lme/tot*100),wp=Math.round(tot/maxL*100);return `<div style="flex:1;min-width:130px"><div style="${SUB}">${r[0]} (${r[1]} +${nf(r[2],0)})</div><div style="height:13px;border-radius:3px;width:${wp}%;background:linear-gradient(90deg,var(--gold) ${bp}%,#C76210 ${bp}%)"></div><div style="font-weight:700;margin-top:2px">${nf(tot,0)}</div></div>`;}).join("");landHTML=`<div style="${CARD};margin-top:12px"><div style="${HDR}">Landed cost by region (LME 3M + premium, $/t)</div><div style="display:flex;gap:18px;flex-wrap:wrap">${bars}</div><div style="${NOTE}"><span style="color:var(--gold)">■</span> LME base&nbsp; <span style="color:#C76210">■</span> regional premium — delivered cost buyers actually pay. US carries the Section-232 tariff wedge.</div></div>`;}

function modelProjection(D){
  const s=[...(D.lme_series||[])].reverse().map(r=>r[1]); const n=s.length;
  if(n<3) return {last:s[n-1]||0,lo:0,hi:0,vol:"0",winChg:"0",days:n};
  const last=s[n-1]; const rets=[]; for(let i=1;i<n;i++) rets.push(s[i]/s[i-1]-1);
  const mean=rets.reduce((a,b)=>a+b,0)/rets.length;
  const sd=Math.sqrt(rets.reduce((a,b)=>a+(b-mean)**2,0)/rets.length);
  const band=sd*Math.sqrt(21);
  return {last:Math.round(last),lo:Math.round(last*(1-band)),hi:Math.round(last*(1+band)),vol:(sd*100).toFixed(2),winChg:((last/s[0]-1)*100).toFixed(1),days:n};
}

  return {pos,neg,neu,total,net,label:net>15?"Bullish":(net<-15?"Bearish":"Neutral")};
}

  Object.keys(P.proj||{}).forEach(k=>{const a=P.proj[k],c=pcol[k]||["#8E7C42",""];const da=c[1]?`stroke-dasharray="${c[1]}"`:"";s+=`<polyline points="${a.map(p=>xx(p[0]).toFixed(1)+","+yy(p[1]).toFixed(1)).join(" ")}" fill="none" stroke="${c[0]}" stroke-width="2.2" ${da}/>`;});

 .catch(()=>{document.getElementById("main").innerHTML=
  `<div class="load"><h2>Couldn't load data.json</h2><p class="muted">This dashboard reads <code>data.json</code> from the same folder and must be opened over http(s) (e.g. its GitHub Pages URL), not by double-clicking the local file.</p></div>`;});
</script></body></html>
